name: nudge
description: Nudge - Digital Icebreaker v2
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.2
  wakelock_plus: ^1.2.8
  shared_preferences: ^2.3.2
